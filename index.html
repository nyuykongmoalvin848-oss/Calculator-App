<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="Assets/Styles/styles.css" />
    <title>calculate</title>
  </head>
  <body>
    <div class="calculator">
      <div class="display">0</div>
      <div class="buttons">
        <button class="btn"><span>X</span></button>
        <button class="btn"><span>AC</span></button>
        <button class="btn"><span>%</span></button>
        <button class="orange"><span>÷</span></button>

        <button class="btn2"><span>7</span></button>
        <button class="btn2"><span>8</span></button>
        <button class="btn2"><span>9</span></button>
        <button class="orange"><span>×</span></button>

        <button class="btn2"><span>4</span></button>
        <button class="btn2"><span>5</span></button>
        <button class="btn2"><span>6</span></button>
        <button class="orange"><span>-</span></button>

        <button class="btn2"><span>1</span></button>
        <button class="btn2"><span>2</span></button>
        <button class="btn2"><span>3</span></button>
        <button class="orange"><span>+</span></button>

        <button class="btn3"><span>+/-</span></button>
        <button class="btn2"><span>0</span></button>
        <button class="btn2"><span>.</span></button>
        <button class="orange"><span>=</span></button>
      </div>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
